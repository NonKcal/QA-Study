name: OliveYoung Search Automated Test

on:
  schedule:
    # 한국 시간(KST) 오전 9시는 UTC 기준으로 00시입니다.
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 패키지 및 브라우저 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests python-dotenv
          playwright install chromium

      - name: Playwright 테스트 실행
        env:
          # GitHub Secrets에서 환경변수로 토큰 및 키 주입
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python "01.oliveyoung search 'menscare'/test_oliveyoung_search.py"

      - name: 테스트 증거(Artifact) 업로드
        if: always() # 테스트 실패 시에도 항상 리포트를 남기도록 설정 (ISTQB: 인시던트 로깅)
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-evidence
          path: test-results/
          retention-days: 7 # 리포트 보존 기간 설정